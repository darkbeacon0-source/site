<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GRUPOAEC - Player</title>

<style>

:root{
--verde:#1db954;
--fundo:#121212;
--card:#181818;
}

body{
background:var(--fundo);
color:white;
font-family:Arial;
margin:0;
padding-bottom:120px;
}

header{
padding:20px;
text-align:center;
background:#000;
font-size:24px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:var(--card);
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.thumbnail{
width:100%;
height:160px;
object-fit:cover;
}

.info{
padding:10px;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
box-shadow:0 -5px 20px rgba(0,0,0,0.6);
}

.music-info{
display:flex;
align-items:center;
gap:10px;
}

.music-info img{
width:50px;
height:50px;
border-radius:5px;
}

.controls{
display:flex;
gap:15px;
align-items:center;
}

.controls button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

.controls button:hover{
color:var(--verde);
}

.progress{
width:40%;
}

.progress input{
width:100%;
}

</style>
</head>

<body>

<header>GRUPOAEC 🎵</header>

<div class="grid" id="grid"></div>

<div class="player">

<div class="music-info">
<img id="cover">
<div id="title">Nenhuma música</div>
</div>

<div class="controls">

<button onclick="anterior()">⏮</button>
<button onclick="playPause()">▶️</button>
<button onclick="proxima()">⏭</button>

</div>

<div class="progress">
<input type="range" id="barra" value="0">
</div>

</div>

<audio id="audio"></audio>

<script>

const musicas = Array.from({length:29},(_,i)=>({

titulo:`Música ${i+1}`,
arquivo:`musica${i+1}.mp3`,
thumb:`https://picsum.photos/seed/${i}/400/400`

}));

const grid=document.getElementById("grid");
const audio=document.getElementById("audio");

let index=0;

function render(){

grid.innerHTML=musicas.map((m,i)=>`

<div class="card" onclick="tocar(${i})">

<img src="${m.thumb}" class="thumbnail">

<div class="info">

${m.titulo}

</div>

</div>

`).join("");

}

function tocar(i){

index=i;

audio.src=musicas[i].arquivo;

document.getElementById("title").textContent=musicas[i].titulo;

document.getElementById("cover").src=musicas[i].thumb;

audio.play();

}

function playPause(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

function proxima(){

index++;

if(index>=musicas.length) index=0;

tocar(index);

}

function anterior(){

index--;

if(index<0) index=musicas.length-1;

tocar(index);

}

audio.addEventListener("timeupdate",()=>{

const barra=document.getElementById("barra");

barra.value=(audio.currentTime/audio.duration)*100;

});

document.getElementById("barra").addEventListener("input",(e)=>{

audio.currentTime=(e.target.value/100)*audio.duration;

});

render();

</script>

</body>
</html>
