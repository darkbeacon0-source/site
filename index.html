<div class="modal-content">

<span class="close" onclick="fechar()">×</span>

<h2 id="titulo"></h2>

<audio id="player" controls></audio>

</div>

</div>

<script>

const totalMusicas = 29;

const grid = document.getElementById("grid");

for(let i=1;i<=totalMusicas;i++){

let num = String(i).padStart(2,'0');

let arquivo = "musica"+num+".mp3";
let arquivo = "musica"+i+".mp3";

grid.innerHTML += `
<div class="card" onclick="tocar('${arquivo}','Música ${num}')">
<h3>Música ${num}</h3>
</div>
`;

}

function tocar(arquivo,titulo){

document.getElementById("titulo").innerText = titulo;

document.getElementById("player").src = arquivo;
const player = document.getElementById("player");

player.src = arquivo;

document.getElementById("modal").style.display = "flex";

player.play().catch(() => {});

}

function fechar(){

let player = document.getElementById("player");

player.pause();

player.src="";

document.getElementById("modal").style.display="none";

}

</script>

</body>
</html>
