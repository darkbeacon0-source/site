<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUPOAEC - Músicas</title>
    <style>
        body { background:#141414; color:white; font-family:Arial; text-align:center; margin:0; padding:0; }
        header { background:#000; padding:20px; font-size:2.5rem; color:#e50914; font-weight:900; }
        h1 { margin:40px 0 20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:25px; padding:20px; max-width:1100px; margin:0 auto; }
        .card { background:#222; border-radius:12px; overflow:hidden; cursor:pointer; transition:0.3s; }
        .card:hover { transform:scale(1.08); }
        .thumbnail { width:100%; height:180px; object-fit:cover; }
        .info { padding:15px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:999; align-items:center; justify-content:center; }
        .modal-content { width:90%; max-width:700px; background:#1a1a1a; border-radius:16px; padding:20px; }
        .close { font-size:3rem; float:right; cursor:pointer; color:#aaa; }
        audio { width:100%; margin-top:15px; }
    </style>
</head>
<body>

<header>GRUPOAEC</header>
<h1>🎵 Teste de Músicas</h1>

<div class="grid" id="grid"></div>

<!-- MODAL DO PLAYER -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">×</span>
        <h2 id="modal-titulo" style="margin-bottom:20px;"></h2>
        <img id="modal-capa" style="width:100%; border-radius:12px;" src="">
        <audio id="audio-player" controls autoplay style="margin-top:15px;"></audio>
    </div>
</div>

<script>
const musicas = [
    { titulo: "Música 1 - Teste", arquivo: "musica1.mp3", capa: "https://picsum.photos/id/1016/600/338" },
    { titulo: "Música 2 - Teste", arquivo: "musica2.mp3", capa: "https://picsum.photos/id/237/600/338" }
];

const grid = document.getElementById('grid');
grid.innerHTML = musicas.map(m => `
    <div class="card" onclick="tocar('${m.arquivo}', '${m.titulo}', '${m.capa}')">
        <img src="${m.capa}" class="thumbnail">
        <div class="info"><h3>${m.titulo}</h3></div>
    </div>
`).join('');

function tocar(arquivo, titulo, capa) {
    document.getElementById('modal-titulo').textContent = titulo;
    document.getElementById('modal-capa').src = capa;
    document.getElementById('audio-player').src = arquivo;
    document.getElementById('modal').style.display = 'flex';
}

function fecharModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('audio-player').pause();
}
</script>
</body>
</html>
