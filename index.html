<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Conteúdo - GRUPOAEC</title>
    <style>
        :root {
            --cor-principal: #e50914;
            --fundo: #141414;
            --texto: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--fundo);
            color: var(--texto);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), var(--fundo));
            padding: 20px 5%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--cor-principal);
            letter-spacing: -2px;
        }
        
        .titulo-principal {
            font-size: 3.5rem;
            font-weight: 700;
            text-align: center;
            margin-top: 120px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .secao { padding: 0 5% 60px; }
        .secao h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            border-left: 5px solid var(--cor-principal);
            padding-left: 15px;
        }
        
        .grid-videos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .card {
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s;
            cursor: pointer;
        }
        
        .card:hover {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 0 20px 40px rgba(229, 9, 20, 0.3);
        }
        
        .thumbnail {
            width: 100%;
            height: 158px;
            object-fit: cover;
        }
        
        .info-card { padding: 18px; }
        .info-card h3 { font-size: 1.15rem; margin-bottom: 8px; }
        
        .btn-assistir {
            background: var(--cor-principal);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }
        
        /* Modal Player (mantido igual) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            width: 100%;
            max-width: 1100px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .modal-header {
            padding: 20px 30px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-btn {
            font-size: 2.5rem;
            color: #aaa;
            cursor: pointer;
        }
        
        video {
            width: 100%;
            max-height: 75vh;
            border-radius: 10px;
            background: #000;
        }
        
        @media (max-width: 768px) {
            .titulo-principal { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <!-- HEADER ATUALIZADO -->
    <header>
        <div class="logo">GRUPOAEC</div>
        <div style="color:#aaa; font-size:1.1rem;">grupoaec.com</div>
    </header>

    <!-- TÍTULO PRINCIPAL -->
    <h1 class="titulo-principal">Portal de Conteúdo</h1>

    <!-- SEÇÃO VÍDEOS -->
    <section class="secao">
        <h2>Vídeos</h2>
        
        <div class="grid-videos" id="grid-videos">
            <!-- Cards gerados pelo JS -->
        </div>
    </section>

    <!-- MODAL PLAYER (mantido igual ao anterior) -->
    <div class="modal" id="modal-player">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-titulo">Título do Vídeo</h2>
                <span class="close-btn" id="btn-fechar">×</span>
            </div>
            <div style="padding:20px; background:#000;">
                <video id="video-player" controls autoplay style="width:100%;"></video>
            </div>
        </div>
    </div>

    <script>
        const videos = [
            { id: 1, titulo: "Radar AB2L 2026 - Lawtechs Brasileiras", src: "video1.mp4", thumb: "https://picsum.photos/id/1015/600/338" },
            { id: 2, titulo: "Como a netLex revoluciona contratos com IA", src: "video2.mp4", thumb: "https://picsum.photos/id/201/600/338" },
            { id: 3, titulo: "Jusbrasil + IA: Pesquisa Jurídica em Segundos", src: "video3.mp4", thumb: "https://picsum.photos/id/237/600/338" }
        ];

        function renderizarCards() {
            const grid = document.getElementById('grid-videos');
            grid.innerHTML = videos.map(video => `
                <div class="card" data-id="${video.id}">
                    <img src="${video.thumb}" class="thumbnail" alt="${video.titulo}">
                    <div class="info-card">
                        <h3>${video.titulo}</h3>
                        <button class="btn-assistir">▶ Assistir agora</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    const video = videos.find(v => v.id === id);
                    document.getElementById('modal-titulo').textContent = video.titulo;
                    document.getElementById('video-player').src = video.src;
                    document.getElementById('modal-player').style.display = 'flex';
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderizarCards();
            
            document.getElementById('btn-fechar').addEventListener('click', () => {
                document.getElementById('modal-player').style.display = 'none';
                document.getElementById('video-player').pause();
            });
        });
    </script>
</body>
</html>
