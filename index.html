<script>

// quantidade total de músicas
const totalMusicas = 29;

// gera automaticamente musica01.mp3 até musica29.mp3
const musicas = Array.from({ length: totalMusicas }, (_, i) => {
    const num = String(i + 1).padStart(2, '0');

    return {
        titulo: `Música ${num}`,
        arquivo: `musica${num}.mp3`,
        thumb: "https://picsum.photos/600/338"
    };
});

let musicasFiltradas = [...musicas];

// cria os cards das músicas
function renderizar() {
    const grid = document.getElementById("grid");

    grid.innerHTML = musicasFiltradas.map(m => `
        <div class="card" onclick="tocar('${m.arquivo}', '${m.titulo}')">
            <img src="${m.thumb}" class="thumbnail">
            <div class="info">
                <h3>${m.titulo}</h3>
            </div>
        </div>
    `).join('');
}

// toca a música
function tocar(arquivo, titulo) {
    document.getElementById("modal-titulo").textContent = titulo;
    document.getElementById("audio-player").src = arquivo;
    document.getElementById("modal").style.display = "flex";
}

// fecha o player
function fecharModal() {
    const audio = document.getElementById("audio-player");
    audio.pause();
    audio.src = "";
    document.getElementById("modal").style.display = "none";
}

// busca de músicas
function filtrar() {
    const termo = document.getElementById("busca").value.toLowerCase();

    musicasFiltradas = musicas.filter(m =>
        m.titulo.toLowerCase().includes(termo)
    );

    renderizar();
}

// inicia o site
renderizar();

</script>
