<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUPOAEC - Portal Multimídia</title>
    <style>
        :root { --vermelho: #e50914; --fundo: #141414; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#141414; color:white; font-family:Arial, sans-serif; }
        
        header { background: linear-gradient(#000, #141414); padding:20px 5%; position:fixed; width:100%; z-index:1000; display:flex; justify-content:space-between; align-items:center; }
        .logo { font-size:2.4rem; font-weight:900; color:var(--vermelho); }
        
        h1 { text-align:center; margin-top:110px; font-size:3rem; }
        
        .tabs { display:flex; justify-content:center; gap:20px; margin:30px 0; }
        .tab { padding:12px 30px; background:#222; border-radius:8px; cursor:pointer; font-weight:bold; }
        .tab.active { background:var(--vermelho); }
        
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:25px; padding:0 5%; }
        
        .card { background:#222; border-radius:12px; overflow:hidden; cursor:pointer; transition:0.4s; }
        .card:hover { transform:scale(1.08); }
        .thumbnail { width:100%; height:160px; object-fit:cover; }
        .info { padding:15px; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { width:95%; max-width:900px; background:#1a1a1a; border-radius:16px; overflow:hidden; }
        .modal-header { padding:15px 25px; background:#111; display:flex; justify-content:space-between; }
        .close { font-size:2.8rem; cursor:pointer; color:#aaa; }
        
        video, audio { width:100%; }
    </style>
</head>
<body>

<header>
    <div class="logo">GRUPOAEC</div>
    <div style="color:#aaa;">grupoaec.com</div>
</header>

<h1>Portal Multimídia</h1>

<div class="tabs">
    <div class="tab active" data-tab="videos">📹 Vídeos</div>
    <div class="tab" data-tab="pdfs">📕 PDFs</div>
    <div class="tab" data-tab="musicas">🎵 Músicas (48)</div>
</div>

<div id="videos" class="grid"></div>
<div id="pdfs" class="grid" style="display:none;"></div>
<div id="musicas" class="grid" style="display:none;"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-titulo"></h2>
            <span class="close" onclick="fecharModal()">×</span>
        </div>
        <div id="modal-body" style="padding:20px; background:#000;"></div>
    </div>
</div>

<script>
// ==================== SUAS 48 MÚSICAS (é só editar aqui) ====================
const musicas = [
    {titulo: "Música 01", arquivo: "musica01.mp3", thumb: "https://picsum.photos/id/1016/600/338"},
    {titulo: "Música 02", arquivo: "musica02.mp3", thumb: "https://picsum.photos/id/237/600/338"},
    // ←←← Cole aqui as outras 46 músicas no mesmo formato
    // Exemplo:
    // {titulo: "Música 03", arquivo: "musica03.mp3", thumb: "https://picsum.photos/id/180/600/338"},
];

const videos = [ /* seus vídeos aqui */ ];
const pdfs = [ /* seus pdfs aqui */ ];

// Renderiza tudo
function renderizarMusicas() {
    document.getElementById("musicas").innerHTML = musicas.map(m => `
        <div class="card" onclick="tocarMusica('${m.arquivo}', '${m.titulo}', '${m.thumb}')">
            <img src="${m.thumb}" class="thumbnail">
            <div class="info"><h3>${m.titulo}</h3></div>
        </div>
    `).join('');
}

function tocarMusica(arquivo, titulo, thumb) {
    document.getElementById("modal-titulo").textContent = titulo;
    document.getElementById("modal-body").innerHTML = `
        <img src="${thumb}" style="width:100%; border-radius:12px;">
        <audio controls autoplay style="width:100%; margin-top:15px;">
            <source src="${arquivo}" type="audio/mpeg">
        </audio>
    `;
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

// Troca de abas (mantido simples)
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('videos').style.display = 'none';
        document.getElementById('pdfs').style.display = 'none';
        document.getElementById('musicas').style.display = 'none';
        document.getElementById(tab.dataset.tab).style.display = 'grid';
    });
});

renderizarMusicas();
</script>
</body>
</html>
