<div class="modal-content">

<span class="close" onclick="fechar()">×</span>

<h2 id="titulo"></h2>

<audio id="player" controls></audio>

</div>

</div>

<script>

const totalMusicas = 29;

const grid = document.getElementById("grid");

for(let i=1;i<=totalMusicas;i++){

let num = String(i).padStart(2,'0');

let arquivo = "musica"+num+".mp3";
let arquivo = "musica"+i+".mp3";

grid.innerHTML += `
<div class="card" onclick="tocar('${arquivo}','Música ${num}')">
<h3>Música ${num}</h3>
</div>
`;

}

function tocar(arquivo,titulo){

document.getElementById("titulo").innerText = titulo;

document.getElementById("player").src = arquivo;
const player = document.getElementById("player");

player.src = arquivo;

document.getElementById("modal").style.display = "flex";

player.play().catch(() => {});

}

function fechar(){

let player = document.getElementById("player");

player.pause();

player.src="";

document.getElementById("modal").style.display="none";

}

</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player de Vídeo e Música</title>
</head>
<body>
  <main>
    <h1>Site de Mídia</h1>

    <section>
      <h2>Vídeo</h2>
      <video controls width="720">
        <source src="video1.mp4" type="video/mp4" />
        Seu navegador não suporta vídeo.
      </video>
    </section>

    <section>
      <h2>Músicas</h2>
      <audio id="music-player" controls></audio>
      <div>
        <button type="button" data-src="musica1.mp3">Música 1</button>
        <button type="button" data-src="musica2.mp3">Música 2</button>
        <button type="button" data-src="musica3.mp3">Música 3</button>
        <button type="button" data-src="musica4.mp3">Música 4</button>
        <button type="button" data-src="musica5.mp3">Música 5</button>
      </div>
    </section>
  </main>

  <script>
    const player = document.getElementById('music-player');
    const buttons = document.querySelectorAll('button[data-src]');

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        player.src = button.dataset.src;
        player.play().catch(() => {});
      });
    });
  </script>
</body>
</html>
