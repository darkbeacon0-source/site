<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUPOAEC - Músicas</title>
    <style>
        :root { --vermelho: #e50914; --fundo: #141414; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#141414; color:white; font-family:Arial, sans-serif; }
        
        header { background: linear-gradient(#000, #141414); padding:20px 5%; position:fixed; width:100%; z-index:1000; display:flex; justify-content:space-between; align-items:center; }
        .logo { font-size:2.5rem; font-weight:900; color:var(--vermelho); }
        
        h1 { text-align:center; margin-top:110px; font-size:2.8rem; margin-bottom:20px; }
        
        .busca {
            width:90%; max-width:600px; margin:0 auto 30px;
            padding:12px 20px; border-radius:50px; border:none;
            background:#222; color:white; font-size:1.1rem;
        }
        
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:20px; padding:0 5%; max-width:1200px; margin:0 auto; }
        
        .card { background:#222; border-radius:12px; overflow:hidden; cursor:pointer; transition:0.3s; }
        .card:hover { transform:scale(1.08); box-shadow:0 10px 20px rgba(229,9,20,0.3); }
        .thumbnail { width:100%; height:160px; object-fit:cover; }
        .info { padding:15px; text-align:center; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { width:90%; max-width:800px; background:#1a1a1a; border-radius:16px; overflow:hidden; }
        .modal-header { padding:15px 25px; background:#111; display:flex; justify-content:space-between; align-items:center; }
        .close { font-size:3rem; cursor:pointer; color:#aaa; }
        
        audio { width:100%; padding:10px 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">GRUPOAEC</div>
    <div style="color:#aaa;">grupoaec.com.br</div>
</header>

<h1>🎵 Minhas Músicas (29)</h1>
<input type="text" class="busca" id="busca" placeholder="🔎 Buscar música..." onkeyup="filtrar()">

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-titulo"></h2>
            <span class="close" onclick="fecharModal()">×</span>
        </div>
        <div id="modal-body" style="padding:20px; background:#000; text-align:center;">
            <img id="modal-capa" style="width:100%; max-height:300px; object-fit:cover; border-radius:12px;" src="https://picsum.photos/id/1016/600/338">
            <audio id="audio-player" controls autoplay style="width:90%; margin-top:20px;"></audio>
        </div>
    </div>
</div>

<script>
// Gera automaticamente as 29 músicas (você não precisa editar nada)
const musicas = Array.from({length: 29}, (_, i) => {
    const num = String(i+1).padStart(2, '0');
    return {
        titulo: `Música ${num}`,
        arquivo: `musica${num}.mp3`,
        thumb: "https://picsum.photos/id/1016/600/338"
    };
});

let musicasFiltradas = [...musicas];

function renderizar() {
    const grid = document.getElementById('grid');
    grid.innerHTML = musicasFiltradas.map(m => `
        <div class="card" onclick="tocar('${m.arquivo}', '${m.titulo}')">
            <img src="${m.thumb}" class="thumbnail">
            <div class="info"><h3>${m.titulo}</h3></div>
        </div>
    `).join('');
}

function tocar(arquivo, titulo) {
    document.getElementById('modal-titulo').textContent = titulo;
    document.getElementById('audio-player').src = arquivo;
    document.getElementById('modal').style.display = 'flex';
}

function fecharModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('audio-player').pause();
}

function filtrar() {
    const termo = document.getElementById('busca').value.toLowerCase();
    musicasFiltradas = musicas.filter(m => m.titulo.toLowerCase().includes(termo));
    renderizar();
}

renderizar();
</script>
</body>
</html>
