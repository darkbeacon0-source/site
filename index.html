<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRUPOAEC - Músicas</title>

<style>

body{
background:#141414;
color:white;
font-family:Arial;
margin:0;
}

header{
background:black;
padding:20px;
display:flex;
justify-content:space-between;
}

.logo{
color:#e50914;
font-size:30px;
font-weight:bold;
}

h1{
text-align:center;
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#222;
padding:20px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

.card:hover{
transform:scale(1.05);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:30px;
border-radius:10px;
width:90%;
max-width:600px;
text-align:center;
}

.close{
font-size:40px;
cursor:pointer;
float:right;
}

audio{
width:100%;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<div class="logo">GRUPOAEC</div>
<div>grupoaec.com.br</div>
</header>

<h1>Minhas Músicas</h1>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="fechar()">×</span>

<h2 id="titulo"></h2>

<audio id="player" controls></audio>

</div>

</div>

<script>

const totalMusicas = 29;

const grid = document.getElementById("grid");

for(let i=1;i<=totalMusicas;i++){

let num = String(i).padStart(2,'0');

let arquivo = "musica"+num+".mp3";

grid.innerHTML += `
<div class="card" onclick="tocar('${arquivo}','Música ${num}')">
<h3>Música ${num}</h3>
</div>
`;

}

function tocar(arquivo,titulo){

document.getElementById("titulo").innerText = titulo;

document.getElementById("player").src = arquivo;

document.getElementById("modal").style.display = "flex";

}

function fechar(){

let player = document.getElementById("player");

player.pause();

player.src="";

document.getElementById("modal").style.display="none";

}

</script>

</body>
</html>
