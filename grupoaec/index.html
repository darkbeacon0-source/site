<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Interno - Grupo AEC</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;color:#333}

/* LOGIN */
#loginTela{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#2c3e50;display:flex;justify-content:center;align-items:center;z-index:9999;
}
.login-box{background:white;padding:30px;border-radius:8px;width:280px;text-align:center;}
.login-box input{width:100%;padding:10px;margin:10px 0;}
.login-box button{width:100%;padding:10px;cursor:pointer;}

/* HEADER */
header{background:#2c3e50;color:white;padding:15px;text-align:center;font-size:20px;}
nav{display:flex;justify-content:center;gap:20px;background:#34495e;padding:10px;}
nav button{background:none;border:none;color:white;font-size:16px;cursor:pointer;}

.section{display:none;padding:30px;}
.active{display:block;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
.card{background:white;border-radius:8px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:140px;object-fit:cover;}
.card p{padding:10px;margin:0;}

canvas{background:black;margin-top:20px}

/* PLAYER */
.player{
position:fixed;bottom:0;left:0;width:100%;
background:#2c3e50;color:white;display:flex;justify-content:space-between;padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela">
<div class="login-box">
<h3>Acesso</h3>
<input id="usuario">
<input id="senha" type="password">
<button onclick="logar()">Entrar</button>
<p id="erroLogin"></p>
</div>
</div>

<header>Portal Interno - Grupo AEC</header>

<nav>
<button onclick="mostrar('musicas')">Cursos</button>
<button onclick="mostrar('videos')">Biblioteca</button>
<button onclick="mostrar('mangas')">Documentos</button>
<button onclick="mostrar('jogos')">Jogos</button>
</nav>

<!-- MUSICAS -->
<div id="musicas" class="section active">
<h2>Áudios</h2>
<div class="grid" id="gridMusicas"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Vídeos</h2>
<div class="grid" id="gridVideos"></div>
<video id="playerVideo" width="100%" controls></video>
</div>

<!-- MANGAS -->
<div id="mangas" class="section">
<h2>Mangas</h2>
<div id="mangaViewer"></div>
</div>

<!-- JOGOS -->
<div id="jogos" class="section">
<h2>🎮 Jogos</h2>
<canvas id="snake" width="300" height="300"></canvas>
</div>

<!-- PLAYER -->
<div class="player">
<div id="titulo">Nenhum áudio</div>
<button onclick="playPause()">▶️</button>
</div>

<audio id="audio"></audio>

<script>

/* LOGIN */
function logar(){
if(usuario.value==="admin" && senha.value==="admin"){
loginTela.style.display="none"
}else{
erroLogin.innerText="Erro"
}
}

/* ABAS */
function mostrar(s){
document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"))
document.getElementById(s).classList.add("active")
}

/* MUSICAS */
const musicas = Array.from({length:10},(_,i)=>({
titulo:`Curso ${i+1}`,
arquivo:`musica${i+1}.mp3`,
thumb:`https://picsum.photos/seed/${i}/400/300`
}));

const audio=document.getElementById("audio")

function renderMusicas(){
gridMusicas.innerHTML=musicas.map((m,i)=>`
<div class="card" onclick="tocar(${i})">
<img src="${m.thumb}">
<p>${m.titulo}</p>
</div>
`).join("")
}

function tocar(i){
audio.src=musicas[i].arquivo
titulo.innerText=musicas[i].titulo
audio.play()
}

function playPause(){
audio.paused?audio.play():audio.pause()
}

renderMusicas()

/* VIDEOS */
const videos=[
{
titulo:"Video 1",
arquivo:"videos/video1.mp4",
thumb:"https://picsum.photos/300/200?1"
}
]

function renderVideos(){
gridVideos.innerHTML=videos.map(v=>`
<div class="card" onclick="playVideo('${v.arquivo}')">
<img src="${v.thumb}">
<p>${v.titulo}</p>
</div>
`).join("")
}

function playVideo(v){
playerVideo.src=v
playerVideo.play()
}

renderVideos()

/* MANGA */
const paginas=["mangas/01.jpg","mangas/02.jpg"]

mangaViewer.innerHTML=paginas.map(p=>`
<img src="${p}" style="width:100%">
`).join("")

/* COBRINHA */
const ctx=snake.getContext("2d")
let s=[{x:10,y:10}],dx=1,dy=0

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"){dx=0;dy=-1}
if(e.key==="ArrowDown"){dx=0;dy=1}
if(e.key==="ArrowLeft"){dx=-1;dy=0}
if(e.key==="ArrowRight"){dx=1;dy=0}
})

setInterval(()=>{
s.unshift({x:s[0].x+dx,y:s[0].y+dy})
s.pop()
ctx.clearRect(0,0,300,300)
ctx.fillStyle="lime"
s.forEach(p=>ctx.fillRect(p.x*10,p.y*10,10,10))
},100)

</script>

</body>
</html>
