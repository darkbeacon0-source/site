<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Interno - Grupo AEC</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;color:#333}

/* LOGIN */
#loginTela{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#2c3e50;display:flex;justify-content:center;align-items:center;z-index:9999;
}
.login-box{background:white;padding:30px;border-radius:8px;width:280px;text-align:center;}
.login-box input{width:100%;padding:10px;margin:10px 0;}
.login-box button{width:100%;padding:10px;cursor:pointer;}

/* HEADER */
header{background:#2c3e50;color:white;padding:15px;text-align:center;font-size:20px;}
nav{display:flex;justify-content:center;gap:20px;background:#34495e;padding:10px;}
nav button{background:none;border:none;color:white;font-size:16px;cursor:pointer;}

.section{display:none;padding:30px;}
.active{display:block;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
.card{background:white;border-radius:8px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:140px;object-fit:cover;}
.card p{padding:10px;margin:0;}

/* PLAYER */
.player{
position:fixed;bottom:0;left:0;width:100%;
background:#2c3e50;color:white;
display:flex;align-items:center;justify-content:space-between;padding:10px;
}
.controls button{
background:none;border:none;color:white;font-size:18px;cursor:pointer;
}
.progress{width:30%;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela">
<div class="login-box">
<h3>Acesso</h3>
<input id="usuario">
<input id="senha" type="password">
<button onclick="logar()">Entrar</button>
<p id="erroLogin" style="color:red"></p>
</div>
</div>

<header>Portal Interno - Grupo AEC</header>

<nav>
<button onclick="mostrar('musicas')">Cursos</button>
<button onclick="mostrar('videos')">Biblioteca</button>
<button onclick="mostrar('mangas')">Documentos</button>
</nav>

<!-- MUSICAS -->
<div id="musicas" class="section active">
<h2>Cursos</h2>
<div class="grid" id="gridMusicas"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Vídeos</h2>
<div class="grid" id="gridVideos"></div>
<br>
<video id="playerVideo" width="100%" controls></video>
</div>

<!-- MANGAS -->
<div id="mangas" class="section">
<h2>Documentos</h2>
<div id="mangaViewer"></div>
</div>

<!-- PLAYER -->
<div class="player">

<div id="titulo">Nenhum áudio</div>

<div class="controls">
<button onclick="anterior()">⏮</button>
<button onclick="playPause()">▶️</button>
<button onclick="proxima()">⏭</button>
<button onclick="toggleShuffle()">🔀</button>
</div>

<div class="progress">
<input type="range" id="barra" value="0">
</div>

<div>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

</div>

<audio id="audio"></audio>

<script>

/* LOGIN */
function logar(){
if(usuario.value==="admin" && senha.value==="admin"){
loginTela.style.display="none"
}else{
erroLogin.innerText="Usuário ou senha incorretos"
}
}

/* ABAS */
function mostrar(secao){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(secao).classList.add("active")
}

/* MUSICAS (48 AUTOMATICAS) */
const musicas = Array.from({length:48},(_,i)=>({
titulo:`Curso ${i+1}`,
arquivo:`musica${i+1}.mp3`,
thumb:`https://picsum.photos/seed/${i}/400/300`
}));

const audio=document.getElementById("audio")
let index=0
let shuffle=false

function renderMusicas(){
gridMusicas.innerHTML=musicas.map((m,i)=>`
<div class="card" onclick="tocar(${i})">
<img src="${m.thumb}">
<p>${m.titulo}</p>
</div>
`).join("")
}

function tocar(i){
index=i
audio.src=musicas[i].arquivo
titulo.innerText=musicas[i].titulo
audio.play()
}

function playPause(){
audio.paused?audio.play():audio.pause()
}

function proxima(){
if(shuffle){
index=Math.floor(Math.random()*musicas.length)
}else{
index=(index+1)%musicas.length
}
tocar(index)
}

function anterior(){
index=(index-1+musicas.length)%musicas.length
tocar(index)
}

function toggleShuffle(){
shuffle=!shuffle
alert("Shuffle: "+(shuffle?"ON":"OFF"))
}

/* PROGRESSO */
audio.addEventListener("timeupdate",()=>{
barra.value=(audio.currentTime/audio.duration)*100 || 0
})

barra.addEventListener("input",()=>{
audio.currentTime=(barra.value/100)*audio.duration
})

audio.addEventListener("ended",proxima)

/* VOLUME */
volume.addEventListener("input",()=>{
audio.volume=volume.value
})

renderMusicas()

/* VIDEOS */
const videos=[
{
titulo:"Treinamento 01",
arquivo:"videos/video1.mp4",
thumb:"https://picsum.photos/300/200?1"
}
]

function renderVideos(){
gridVideos.innerHTML=videos.map(v=>`
<div class="card" onclick="playVideo('${v.arquivo}')">
<img src="${v.thumb}">
<p>${v.titulo}</p>
</div>
`).join("")
}

function playVideo(v){
playerVideo.src=v
playerVideo.play()
}

renderVideos()

/* MANGAS */
const paginas=["mangas/01.jpg","mangas/02.jpg"]

mangaViewer.innerHTML=paginas.map(p=>`
<img src="${p}" style="width:100%;margin-bottom:20px">
`).join("")

</script>

</body>
</html>
