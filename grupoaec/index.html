<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Interno - Grupo AEC</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;color:#333}

/* LOGIN */
#loginTela{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#2c3e50;display:flex;justify-content:center;align-items:center;z-index:9999;
}
.login-box{background:white;padding:30px;border-radius:8px;width:280px;text-align:center;}
.login-box input{width:100%;padding:10px;margin:10px 0;}
.login-box button{width:100%;padding:10px;cursor:pointer;}

/* HEADER */
header{background:#2c3e50;color:white;padding:15px;text-align:center;font-size:20px;}
nav{display:flex;justify-content:center;gap:20px;background:#34495e;padding:10px;}
nav button{background:none;border:none;color:white;font-size:16px;cursor:pointer;}
nav button:hover{text-decoration:underline;}

.section{display:none;padding:30px;}
.active{display:block;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
.card{background:white;border-radius:8px;overflow:hidden;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.card img{width:100%;height:140px;object-fit:cover;}
.card p{padding:10px;margin:0;}

canvas{background:#000;border-radius:10px;margin:10px;}

.player{
position:fixed;bottom:0;left:0;width:100%;
background:#2c3e50;color:white;display:flex;align-items:center;justify-content:space-between;padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginTela">
<div class="login-box">
<h3>Acesso ao Portal</h3>
<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="logar()">Entrar</button>
<p id="erroLogin" style="color:red"></p>
</div>
</div>

<header>Portal Interno - Grupo AEC</header>

<nav>
<button onclick="mostrar('musicas')">Cursos</button>
<button onclick="mostrar('videos')">Biblioteca</button>
<button onclick="mostrar('mangas')">Documentos</button>
<button onclick="mostrar('jogos')">Jogos</button>
</nav>

<!-- MUSICAS -->
<div id="musicas" class="section active">
<h2>Cursos</h2>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Biblioteca de Vídeos</h2>
<div class="grid" id="gridVideos"></div>
<br>
<video id="playerVideo" width="100%" controls></video>
</div>

<!-- MANGAS -->
<div id="mangas" class="section">
<h2>Documentos</h2>
<div id="mangaViewer"></div>
</div>

<!-- JOGOS -->
<div id="jogos" class="section">
<h2>🎮 Arcade Offline</h2>

<canvas id="snake" width="250" height="250"></canvas>

</div>

<script>

/* LOGIN */
function logar(){
if(usuario.value==="admin" && senha.value==="admin"){
loginTela.style.display="none"
}else{
erroLogin.innerText="Usuário ou senha incorretos"
}
}

/* ABAS */
function mostrar(s){
document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"))
document.getElementById(s).classList.add("active")
}

/* ================= VIDEOS ================= */

const videos = [
{
titulo: "Treinamento 01",
arquivo: "videos/video1.mp4",
thumb: "https://picsum.photos/300/200?1"
}
];

const gridVideos = document.getElementById("gridVideos");
const player = document.getElementById("playerVideo");

function renderVideos(){
gridVideos.innerHTML = videos.map(v => `
<div class="card" onclick="playVideo('${v.arquivo}', '${v.titulo}')">
<img src="${v.thumb}">
<p>${v.titulo}</p>
</div>
`).join("");
}

function playVideo(src, titulo){
player.src = src;
player.play();
document.querySelector("#videos h2").innerText = "▶️ " + titulo;
}

renderVideos();

/* ================= MANGAS ================= */

const mangas = [
{
nome:"Exemplo",
paginas:[
"mangas/01.jpg",
"mangas/02.jpg"
]
}
];

const mangaViewer=document.getElementById("mangaViewer");

function renderMangaLista(){
mangaViewer.innerHTML = mangas.map((m,i)=>`
<div class="card" onclick="abrirManga(${i})">
<p>${m.nome}</p>
</div>
`).join("");
}

function abrirManga(i){
mangaViewer.innerHTML = mangas[i].paginas.map(p=>
`<img src="${p}" style="width:100%;margin-bottom:20px">`
).join("");
}

renderMangaLista();

/* ================= COBRINHA ================= */

const ctx = snake.getContext("2d");

let s=[{x:10,y:10}],f={x:5,y:5},dx=1,dy=0;

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp"){dx=0;dy=-1}
if(e.key==="ArrowDown"){dx=0;dy=1}
if(e.key==="ArrowLeft"){dx=-1;dy=0}
if(e.key==="ArrowRight"){dx=1;dy=0}
});

setInterval(()=>{
s.unshift({x:s[0].x+dx,y:s[0].y+dy});
if(s[0].x==f.x&&s[0].y==f.y){
f={x:Math.random()*20|0,y:Math.random()*20|0}
}else{s.pop();}
ctx.clearRect(0,0,250,250);
ctx.fillStyle="lime";
s.forEach(p=>ctx.fillRect(p.x*10,p.y*10,10,10));
ctx.fillStyle="red";
ctx.fillRect(f.x*10,f.y*10,10,10);
},100);

</script>

</body>
</html>
